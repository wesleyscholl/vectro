[build-system]
requires = ["setuptools>=61.0", "wheel", "cython>=0.29", "numpy>=1.25"]
build-backend = "setuptools.build_meta"

[project]
name = "vectro"
version = "2.0.0"
description = "Mojo-first ultra-high-performance LLM embedding compressor with vector DB integrations, migration tooling, streaming decompression, and a CLI (v2.0: 158 tests, 11 modules)"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Wesley Scholl", email = "wesley.scholl@example.com"}
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Other",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Hardware",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Environment :: GPU",
]
keywords = [
    "embeddings",
    "quantization", 
    "compression",
    "llm",
    "mojo",
    "performance",
    "high-performance-computing",
    "vector-database",
    "rag",
    "simd",
    "optimization",
]
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.25",
    "cython>=0.29",
    "click>=8.0",
    "matplotlib>=3.5",
    "scikit-learn>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]
integrations = [
    "qdrant-client>=1.9",
    "weaviate-client>=4.0",
    "torch>=2.0",
    "transformers>=4.36",
]
data = [
    "pyarrow>=12.0",
]
bench = [
    "rich>=13.0",
    "tqdm>=4.0",
]
mojo = [
    # Mojo SDK is required for building from source with Mojo backend
    # Install from: https://www.modular.com/mojo
]

[project.urls]
Homepage = "https://github.com/wesleyscholl/vectro"
Documentation = "https://github.com/wesleyscholl/vectro#readme"
Repository = "https://github.com/wesleyscholl/vectro"
Issues = "https://github.com/wesleyscholl/vectro/issues"

[project.scripts]
vectro = "python.cli:main"

[tool.setuptools]
packages = ["python"]
package-dir = {"python" = "python"}

[tool.setuptools.package-data]
python = ["*.pyx"]
"*" = ["src/*.mojo"]

[tool.cython]
language_level = 3