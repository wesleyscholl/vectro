name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Rust tests + bench smoke-test ──────────────────────────────────────────
  rust-tests:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      - name: Bench smoke-test (--test flag, no timing)
        run: |
          cargo bench -p vectro_lib --bench int8_bench  -- --test
          cargo bench -p vectro_lib --bench simd_bench  -- --test

  # ── Python tests ───────────────────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy "scikit-learn>=1.3" "pytest>=7.0" pytest-cov pytest-benchmark

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            -q --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            --cov=python --cov-report=xml -q

      - name: Upload to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Rust line-coverage gate (≥ 90 %) ──────────────────────────────────────
  rust-coverage:
    name: Rust coverage (≥90%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-cov-ubuntu-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate LCOV report and enforce ≥ 90% line coverage
        run: |
          cargo llvm-cov --workspace \
            --lcov --output-path lcov.info \
            --fail-under-lines 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

