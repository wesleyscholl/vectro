name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Rust tests + bench smoke-test ──────────────────────────────────────────
  rust-tests:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      - name: Bench smoke-test (--test flag, no timing)
        run: |
          cargo bench -p vectro_lib --bench int8_bench  -- --test
          cargo bench -p vectro_lib --bench simd_bench  -- --test

  # ── Python tests ───────────────────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy "scikit-learn>=1.3" "pytest>=7.0" pytest-cov pytest-benchmark \
            "onnx>=1.14" "onnxruntime>=1.17"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            --ignore=tests/test_latency_singleshot.py \
            -q --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            --ignore=tests/test_latency_singleshot.py \
            --cov=python --cov-report=xml -q

      - name: Upload to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Rust line-coverage gate (≥ 90 %) ──────────────────────────────────────
  rust-coverage:
    name: Rust coverage (≥90%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-cov-ubuntu-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate LCOV report and enforce ≥ 90% line coverage
        run: |
          cargo llvm-cov --workspace \
            --lcov --output-path lcov.info \
            --fail-under-lines 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # ── Node.js N-API native addon build ──────────────────────────────────────
  node-bindings:
    name: Node.js N-API build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: js/node_modules
          key: node-${{ hashFiles('js/package.json') }}

      - name: Install dependencies
        run: cd js && npm install

      - name: Build native addon
        run: cd js && npm run build

      - name: Smoke-test exports
        run: |
          node -e "
            const v = require('./js');
            const keys = Object.keys(v);
            console.log('Exported symbols:', keys.join(', '));
            if (!keys.includes('dequantize'))  process.exit(1);
            if (!keys.includes('readVqz'))     process.exit(1);
            if (!keys.includes('VqzReader'))   process.exit(1);
            console.log('All required exports present.');
          "

# gpu-throughput:
#   runs-on: [self-hosted, gpu, cuda-12]
#   # Phase 12 target: >= 50M vec/s on A10G.
#   # Uncomment when a CUDA self-hosted runner is provisioned.
#   needs: python-tests
#   steps:
#     - uses: actions/checkout@v4
#     - run: pip install ".[all]"
#     - run: python -m pytest tests/test_gpu_equivalence.py -v

  # ── Latency gate: vectro_py shape / dtype / cosine + p99 < 1 ms ───────────
  latency-gate:
    name: Latency gate (vectro_py)
    runs-on: ubuntu-latest
    needs: rust-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-latency-ubuntu-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin + test deps
        run: pip install maturin numpy pytest

      - name: Build vectro_py (release)
        run: maturin develop --release -m rust/vectro_py/Cargo.toml

      - name: Run latency tests
        run: python -m pytest tests/test_latency_singleshot.py -v --tb=short

  mojo-ipc-smoke:
    name: Mojo IPC pipe smoke-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install numpy pytest

      - name: Install pipe stub as vectro_quantizer
        run: cp scripts/vectro_quantizer_stub.py vectro_quantizer && chmod +x vectro_quantizer

      - name: Run Mojo bridge tests via stub
        run: python -m pytest tests/test_mojo_bridge.py -v --tb=short
