name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy "scikit-learn>=1.3" "pytest>=7.0" pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            -q --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_mojo_bridge.py \
            --ignore=tests/test_arrow_bridge.py \
            --ignore=tests/test_torch_bridge.py \
            --ignore=tests/test_qdrant_connector.py \
            --ignore=tests/test_weaviate_connector.py \
            --ignore=tests/test_integrations_api.py \
            --cov=python --cov-report=xml -q
