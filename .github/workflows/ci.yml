name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run Python API tests
        run: |
          python -m unittest \
            tests.test_python_api \
            tests.test_integration \
            tests.test_integrations_api \
            tests.test_qdrant_connector \
            tests.test_weaviate_connector \
            tests.test_torch_bridge \
            tests.test_arrow_bridge \
            tests.test_streaming \
            tests.test_quantization_extra \
            tests.test_migration
