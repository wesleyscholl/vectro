name: npm publish

# Publishes @vectro/core to npm on every version tag.
# Requires a repository secret named NPM_TOKEN with publish permission.
# See https://docs.npmjs.com/creating-and-viewing-access-tokens

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @vectro/core to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        # Skip pre-releases (rc / alpha / beta tags)
        if: >-
          !contains(github.ref_name, 'rc') &&
          !contains(github.ref_name, 'alpha') &&
          !contains(github.ref_name, 'beta')
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
