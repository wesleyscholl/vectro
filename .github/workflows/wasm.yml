name: WASM Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-build:
    name: Build & size-check vectro_lib WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install brotli (for size check)
        run: sudo apt-get install -y brotli

      - name: Build WASM package (release)
        working-directory: rust/vectro_lib
        run: |
          wasm-pack build \
            --target web \
            --release \
            --out-dir ../../wasm-pkg

      - name: Check compressed .wasm size < 500 KB
        run: |
          WASM_FILE=$(find wasm-pkg -name '*.wasm' | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "ERROR: no .wasm file found in wasm-pkg/"
            exit 1
          fi

          ORIG_BYTES=$(stat -c%s "$WASM_FILE")
          brotli --best --keep --output="${WASM_FILE}.br" "$WASM_FILE"
          BR_BYTES=$(stat -c%s "${WASM_FILE}.br")
          LIMIT=512000

          echo "--- WASM size report ---"
          echo "  Raw  : $ORIG_BYTES bytes ($(( ORIG_BYTES / 1024 )) KB)"
          echo "  .br  : $BR_BYTES bytes ($(( BR_BYTES / 1024 )) KB)"
          echo "  Limit: $LIMIT bytes (500 KB)"

          if [ "$BR_BYTES" -gt "$LIMIT" ]; then
            echo "FAIL: brotli-compressed .wasm ($BR_BYTES B) exceeds 500 KB limit."
            exit 1
          fi

          echo "PASS: .wasm within size budget."

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectro-wasm
          path: wasm-pkg/
          retention-days: 14
