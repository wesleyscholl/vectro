name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches pyproject.toml
        run: |
          PKG_VERSION=$(python - <<'EOF'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          EOF
          )
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Smoke-test on ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Basic smoke test
        run: |
          python - <<'EOF'
          import python as v
          import numpy as np

          rng = np.random.default_rng(0)
          vecs = rng.standard_normal((64, 128)).astype(np.float32)
          result = v.Vectro().compress_batch(vecs)
          assert result.compression_ratio > 1.0
          print(f"smoke test ok — compression {result.compression_ratio:.2f}×")
          EOF

  github_release:
    name: Create GitHub Release
    needs: [build, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          python - <<PYEOF > release_notes.md
          import re, pathlib
          text = pathlib.Path("CHANGELOG.md").read_text()
          pattern = rf"## \[{re.escape(VERSION)}\].*?(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          if m:
              print(m.group(0).strip())
          else:
              print(f"Release {VERSION}")
          PYEOF
          echo "Release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Vectro ${{ needs.build.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  publish_pypi:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    # Only publish on non-prerelease tags and when the PYPI_API_TOKEN secret is set
    if: |
      !contains(github.ref_name, 'rc') &&
      !contains(github.ref_name, 'alpha') &&
      !contains(github.ref_name, 'beta')
    environment:
      name: pypi
      url: https://pypi.org/project/vectro/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Twine
        run: pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz
