# cargo-deny configuration — Konjo Quality Framework
[licenses]
allow = ["MIT","Apache-2.0","Apache-2.0 WITH LLVM-exception","BSD-2-Clause","BSD-3-Clause","ISC","Unicode-DFS-2016","CC0-1.0","Zlib","OpenSSL"]
copyleft = "deny"
unlicensed = "deny"
confidence-threshold = 0.8
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
