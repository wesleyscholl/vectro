<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vectro</title>
<style>
  :root {
    --bg: #000008;
    --ink: #d8def0;
    --ink-dim: #6f7894;
    --ink-faint: #2a3148;
    --konjo: #7c3aed;
    --blue: #3b82f6;
    --aurora: #10b981;
    --glass: rgba(14, 18, 36, 0.55);
    --glass-edge: rgba(124, 58, 237, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter",
                 system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at 50% 50%, rgba(124, 58, 237, 0.10), transparent 60%),
      radial-gradient(ellipse at 18% 22%, rgba(59, 130, 246, 0.08), transparent 55%),
      radial-gradient(ellipse at 82% 78%, rgba(16, 185, 129, 0.07), transparent 55%),
      var(--bg);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1.0; }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes input-glow {
    0%, 100% { box-shadow: 0 0 0 1px var(--glass-edge), 0 0 24px rgba(124, 58, 237, 0.10); }
    50%      { box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.45), 0 0 32px rgba(124, 58, 237, 0.22); }
  }
  @keyframes star-drop {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }

  #stars {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Brand corner */
  .brand {
    position: fixed;
    top: 28px; left: 36px;
    z-index: 5;
    letter-spacing: 0.08em;
    animation: fade-in 0.8s ease 0.1s both;
  }
  .brand .mark {
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.32em;
  }
  .brand .name {
    font-size: 18px;
    color: var(--ink);
    margin-top: 4px;
    font-weight: 500;
  }

  .nav {
    position: fixed;
    top: 28px; right: 36px;
    z-index: 5;
    display: flex; gap: 22px;
    animation: fade-in 0.8s ease 0.2s both;
  }
  .nav a {
    color: var(--ink-dim);
    text-decoration: none;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    transition: 0.18s ease;
  }
  .nav a:hover { color: var(--konjo); }

  /* Centerpiece */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    pointer-events: none;
    padding: 0 32px;
  }
  .stage > * { pointer-events: auto; }

  .lede {
    text-align: center;
    animation: fade-in 1s ease 0.25s both;
  }
  .lede h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 300;
    letter-spacing: -0.02em;
    margin: 0;
    background: linear-gradient(180deg, #f5f7ff 0%, #a3aed0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.05;
  }
  .lede .tag {
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-top: 14px;
  }

  /* Search input */
  .search-wrap {
    position: relative;
    width: min(640px, 90vw);
    animation: fade-in 1s ease 0.4s both, input-glow 4s ease-in-out 1.5s infinite;
    border-radius: 999px;
  }
  .search {
    width: 100%;
    height: 60px;
    padding: 0 28px 0 56px;
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    border-radius: 999px;
    color: var(--ink);
    font-size: 16px;
    font-family: inherit;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    outline: none;
    transition: 0.18s ease;
    letter-spacing: 0.02em;
  }
  .search::placeholder { color: var(--ink-dim); letter-spacing: 0.04em; }
  .search:focus {
    border-color: var(--konjo);
  }
  .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-dim);
    pointer-events: none;
    font-size: 16px;
  }
  .search-hint {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Constellation under input */
  .constellation {
    position: relative;
    width: min(640px, 90vw);
    height: 96px;
    animation: fade-in 1.1s ease 0.55s both;
  }
  .constellation svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .count-pill {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 6px 16px;
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .count-pill .n {
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-right: 6px;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 28px; left: 0; right: 0;
    display: flex;
    justify-content: center;
    z-index: 5;
    animation: fade-in 1s ease 0.7s both;
  }
  .footer .row {
    display: flex;
    gap: 32px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
    align-items: center;
  }
  .footer .row .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink-faint);
  }

  /* Quiet status indicator near footer */
  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--aurora);
    margin-right: 8px;
    box-shadow: 0 0 8px var(--aurora);
    animation: input-glow 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<svg id="stars" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>

<div class="brand">
  <div class="mark">Konjo · Vectro</div>
  <div class="name">v8 · Star Field</div>
</div>

<nav class="nav">
  <a href="viz.html">Visualize →</a>
  <a href="https://github.com/konjoai/vectro" target="_blank" rel="noopener">GitHub</a>
  <a href="../PAPER.md" target="_blank">Paper</a>
</nav>

<main class="stage">
  <div class="lede">
    <h1>Search a galaxy of vectors.</h1>
    <div class="tag">Embedding compression · approximate kNN · pure code</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input
      class="search"
      id="q"
      type="text"
      placeholder="Type anything — every keystroke fires a vector search"
      autocomplete="off"
      spellcheck="false"
    />
    <span class="search-hint" id="hint">live</span>
  </div>

  <div class="constellation" aria-hidden="true">
    <svg id="cons" viewBox="0 0 640 96" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="count-pill"><span class="n" id="count-n">0</span>matches in the field</div>
  </div>
</main>

<div class="footer">
  <div class="row">
    <span><span class="pulse-dot"></span><span id="status">offline · self-hosted demo</span></span>
    <span class="dot"></span>
    <span>2026 · MIT</span>
    <span class="dot"></span>
    <span>Konjo AI</span>
  </div>
</div>

<script>
"use strict";

const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:')
  ? location.origin : null;
const INDEX_NAME = 'starfield';
const DIM = 32;

// ── Background star field (matches viz.html aesthetic) ────────────
function buildBackgroundStars() {
  const W = window.innerWidth, H = window.innerHeight;
  const N = Math.max(420, Math.floor(W * H / 1900));
  const svg = document.getElementById('stars');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  let s = '';
  for (let i = 0; i < N; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 0.9 + 0.15;
    const o = Math.random() * 0.6 + 0.15;
    const dur = (Math.random() * 4 + 2.5).toFixed(2);
    const delay = (-Math.random() * 6).toFixed(2);
    s += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(2)}" fill="#fff" fill-opacity="${o.toFixed(2)}" style="animation: twinkle ${dur}s ease-in-out ${delay}s infinite"/>`;
  }
  svg.innerHTML = s;
}
window.addEventListener('resize', buildBackgroundStars);

// ── Constellation: query → 32-D vector → cosine top-k → SVG dots ──
//
// The "result count" is rendered as a constellation pattern:
// each match becomes one star plotted on a 640×96 strip, with size +
// brightness encoding similarity score. Dots are connected by faint
// lines forming an arbitrary spanning path so the result count reads
// as a *shape*, not a number.

const CLUSTER_COLORS = ['#7c3aed', '#3b82f6', '#10b981'];
const corpus = []; // { id, label, vec, cluster }

function gaussian() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function hash32(str) {
  // Cheap, deterministic 32-D embedding for any input — every char
  // perturbs a fixed-cluster centre so visually-similar queries cluster
  // together. Good enough for a landing-page demo; not for production.
  let cluster = 0;
  for (let i = 0; i < str.length; i++) cluster = (cluster + str.charCodeAt(i) * 7) % 3;
  const v = new Float32Array(DIM);
  // Seeded via a tiny xorshift over the string
  let seed = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    seed ^= str.charCodeAt(i);
    seed = Math.imul(seed, 16777619) >>> 0;
  }
  function rnd() {
    seed ^= seed << 13; seed >>>= 0;
    seed ^= seed >> 17; seed >>>= 0;
    seed ^= seed << 5;  seed >>>= 0;
    return ((seed & 0x7fffffff) / 0x7fffffff) * 2 - 1;
  }
  for (let i = 0; i < DIM; i++) v[i] = (cluster === i % 3 ? 1.5 : 0) + rnd() * 0.6;
  return { vec: v, cluster };
}

// Seed corpus with a small set of human-friendly labels so empty-input
// state shows something — not just a zero count.
const SEED = [
  'embedding', 'vector', 'cosine', 'graph', 'beam search',
  'index', 'compression', 'quantization', 'INT8', 'NF4',
  'PQ-96', 'binary', 'HNSW', 'recall', 'latency',
  'throughput', 'p99', 'GPU', 'BLAS', 'numpy',
  'document', 'paper', 'cluster', 'star', 'galaxy',
  'orbit', 'centre', 'edge', 'node', 'kernel',
];
let nextCorpusId = 0;
for (const label of SEED) {
  const { vec, cluster } = hash32(label);
  corpus.push({ id: nextCorpusId++, label, vec, cluster });
}

function cosineLocal(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  if (na === 0 || nb === 0) return 0;
  return dot / Math.sqrt(na * nb);
}

function searchLocal(qStr, k) {
  if (!qStr) return [];
  const { vec } = hash32(qStr);
  const scored = corpus.map(c => ({ c, score: cosineLocal(vec, c.vec) }));
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, k);
}

function renderConstellation(hits) {
  const svg = document.getElementById('cons');
  document.getElementById('count-n').textContent = hits.length;
  if (hits.length === 0) { svg.innerHTML = ''; return; }

  // Layout: stretch hits across the strip; vertical jitter from a
  // deterministic per-hit hash so the constellation is stable per query.
  const w = 640, h = 96;
  const margin = 24;
  const xs = hits.map((_, i) =>
    margin + (hits.length === 1 ? (w - 2 * margin) / 2 : (i / (hits.length - 1)) * (w - 2 * margin)));
  // Smooth curve through the points: y from a slow sin so the
  // "constellation" feels like a celestial trail
  const ys = hits.map((h, i) => {
    const t = i / Math.max(1, hits.length - 1);
    return h / 2 + Math.sin(t * Math.PI * 1.2 + h.score * 6) * 18;
  });

  let svgEls = '';
  // Connecting trail (cubic-ish via polyline)
  let path = '';
  for (let i = 0; i < hits.length; i++) {
    path += (i === 0 ? 'M' : 'L') + xs[i].toFixed(1) + ' ' + ys[i].toFixed(1);
  }
  svgEls += `<path d="${path}" stroke="rgba(124,58,237,0.35)" stroke-width="0.8" fill="none" />`;

  // Stars
  for (let i = 0; i < hits.length; i++) {
    const { c, score } = hits[i];
    const r = 1.6 + Math.max(0, score) * 5;
    const col = CLUSTER_COLORS[c.cluster];
    const haloR = r * 3.2;
    svgEls += `
      <g style="animation: star-drop 0.4s ease ${i * 0.025}s both">
        <circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${haloR.toFixed(1)}" fill="${col}" fill-opacity="0.18" />
        <circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${r.toFixed(1)}" fill="#ffffff" />
      </g>`;
  }
  svg.innerHTML = svgEls;
}

// ── Optional FastAPI bridge ───────────────────────────────────────
const backend = {
  online: false,
  async ping() {
    if (!API_BASE) return false;
    try {
      const r = await fetch(API_BASE + '/health', { cache: 'no-store' });
      this.online = r.ok;
      return this.online;
    } catch (_) { return false; }
  },
};

// ── Wiring ────────────────────────────────────────────────────────
const q = document.getElementById('q');
let timer = null;
function fire() {
  const k = 12;
  const hits = searchLocal(q.value.trim(), k);
  renderConstellation(hits);
}
q.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(fire, 50);
});
q.addEventListener('keydown', (ev) => {
  if (ev.key === 'Enter' && q.value.trim().length) {
    // Treat enter as "remember this term" — adds to the corpus so the
    // landing page becomes its own little vector store across keystrokes.
    const { vec, cluster } = hash32(q.value.trim());
    corpus.push({ id: nextCorpusId++, label: q.value.trim(), vec, cluster });
    fire();
  }
});

async function boot() {
  buildBackgroundStars();
  await backend.ping();
  document.getElementById('status').textContent = backend.online
    ? 'live · FastAPI backend connected'
    : 'offline · static demo · open viz.html for the full field';
  fire();
  q.focus();
}

boot();
</script>
</body>
</html>
