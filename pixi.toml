[workspace]
authors = ["Wesley Scholl <128409641+wesleyscholl@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo"
platforms = ["osx-arm64"]
version = "3.4.0"

[tasks]
build-mojo = "mojo build src/vectro_standalone.mojo -o vectro_quantizer"
selftest    = { cmd = "./vectro_quantizer selftest", depends-on = ["build-mojo"] }
benchmark   = { cmd = "./vectro_quantizer benchmark 10000 768", depends-on = ["build-mojo"] }

[dependencies]
mojo = ">=0.25.7.0.dev2025102305,<0.26"
modular = ">=25.7.0.dev2025102305,<26"
pip = ">=25.2,<26"
